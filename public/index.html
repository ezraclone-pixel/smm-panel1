<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Myat Digital Shop</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            padding-bottom:80px;
        }

        .page{
            display:none;
            padding:20px;
        }

        .active{
            display:block;
        }

        h1{
            font-size:24px;
            margin-bottom:15px;
        }

        .card{
            background:#1e293b;
            padding:15px;
            border-radius:14px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            border:none;
            padding:12px;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            height:65px;
            background:#111827;
            display:flex;
            justify-content:space-around;
            align-items:center;
            border-top:1px solid #1f2937;
        }

        .nav-btn{
            color:#94a3b8;
            font-size:14px;
            cursor:pointer;
        }

        .nav-btn.active{
            color:white;
            font-weight:bold;
        }

        .balance{
            font-size:28px;
            font-weight:bold;
            margin-top:10px;
        }

        .product{
            background:#334155;
            padding:12px;
            border-radius:12px;
            margin-top:10px;
        }
    </style>
</head>
<body>

    <!-- HOME -->
    <div class="page active" id="home">
        <h1>🏠 Home</h1>

        <div class="card">
            <p>Balance</p>
            <div class="balance" id="balance">0</div>

            <button onclick="claimDaily()">
                🎁 Claim Daily Reward
            </button>
        </div>

        <div class="card">
            <p>Invite Friends & Earn</p>

            <button onclick="inviteFriends()">
                👥 Invite
            </button>
        </div>
    </div>

    <!-- SHOP -->
    <div class="page" id="shop">
        <h1>🛒 Shop</h1>

        <div class="product">
            <h3>Facebook Followers</h3>
            <p>1000 Followers</p>

            <button onclick="buyProduct('Facebook Followers',100)">
                Buy - 100 Coins
            </button>
        </div>

        <div class="product">
            <h3>TikTok Likes</h3>
            <p>500 Likes</p>

            <button onclick="buyProduct('TikTok Likes',50)">
                Buy - 50 Coins
            </button>
        </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="page" id="leaderboard">
        <h1>🏆 Leaderboard</h1>

        <div class="card" id="leaderboardData">
            Loading...
        </div>
    </div>

    <!-- WALLET -->
    <div class="page" id="wallet">
        <h1>💰 Wallet</h1>

        <div class="card">
            <p>Your Balance</p>

            <div class="balance" id="walletBalance">
                0
            </div>

            <button onclick="withdraw()">
                Withdraw
            </button>
        </div>
    </div>

    <!-- ORDERS -->
    <div class="page" id="orders">
        <h1>📦 Orders</h1>

        <div class="card" id="ordersData">
            No orders yet
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">

        <div class="nav-btn active" onclick="showPage('home',this)">
            Home
        </div>

        <div class="nav-btn" onclick="showPage('shop',this)">
            Shop
        </div>

        <div class="nav-btn" onclick="showPage('leaderboard',this)">
            Top
        </div>

        <div class="nav-btn" onclick="showPage('wallet',this)">
            Wallet
        </div>

        <div class="nav-btn" onclick="showPage('orders',this)">
            Orders
        </div>

    </div>

    <script src="app.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId, el){

            document.querySelectorAll(".page")
                .forEach(page => page.classList.remove("active"));

            document.getElementById(pageId)
                .classList.add("active");

            document.querySelectorAll(".nav-btn")
                .forEach(btn => btn.classList.remove("active"));

            el.classList.add("active");
        }
    </script>

</body>
</html>
