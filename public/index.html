<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Myat Digital Shop</title>

    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            padding-bottom:90px;
        }

        .header{
            padding:20px;
            text-align:center;
            background:#111827;
            border-bottom:1px solid #1f2937;
        }

        .header h1{
            font-size:24px;
        }

        .card{
            background:#111827;
            margin:15px;
            padding:20px;
            border-radius:18px;
        }

        .balance{
            text-align:center;
        }

        .balance h2{
            font-size:34px;
            margin-top:10px;
            color:#38bdf8;
        }

        button{
            width:100%;
            border:none;
            padding:14px;
            border-radius:14px;
            background:#2563eb;
            color:white;
            font-size:16px;
            margin-top:15px;
            cursor:pointer;
        }

        button:active{
            transform:scale(0.98);
        }

        .shop-item{
            background:#1e293b;
            padding:15px;
            border-radius:14px;
            margin-top:12px;
        }

        .shop-item h3{
            margin-bottom:8px;
        }

        .leaderboard-item{
            display:flex;
            justify-content:space-between;
            background:#1e293b;
            padding:12px;
            border-radius:12px;
            margin-top:10px;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#111827;
            border-top:1px solid #1f2937;
            display:flex;
            justify-content:space-around;
            padding:12px 0;
        }

        .bottom-nav button{
            width:auto;
            margin:0;
            background:none;
            color:white;
            font-size:14px;
        }

        .page{
            display:none;
        }

        .page.active{
            display:block;
        }

        .section-title{
            margin-bottom:15px;
            font-size:18px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            margin-top:10px;
            background:#1e293b;
            color:white;
        }

    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="homePage" class="page active">

        <div class="header">
            <h1>Myat Digital Shop</h1>
            <p id="username">Loading...</p>
        </div>

        <div class="card balance">
            <p>Your Points</p>
            <h2 id="points">0</h2>

            <button onclick="claimDaily()">
                🎁 Daily Reward
            </button>

            <button onclick="inviteFriends()">
                👥 Invite Friends
            </button>
        </div>

        <div class="card">
            <h3 class="section-title">Tasks</h3>

            <button onclick="joinChannel()">
                📢 Join Channel (+2000)
            </button>
        </div>

    </div>

    <!-- SHOP PAGE -->
    <div id="shopPage" class="page">

        <div class="header">
            <h1>Shop</h1>
        </div>

        <div class="card">

            <div class="shop-item">
                <h3>MLBB 86 Diamonds</h3>
                <p>5000 Points</p>

                <button onclick="buyProduct('MLBB 86 Diamonds',5000)">
                    Buy
                </button>
            </div>

            <div class="shop-item">
                <h3>Free Fire 100 Diamonds</h3>
                <p>6000 Points</p>

                <button onclick="buyProduct('Free Fire 100 Diamonds',6000)">
                    Buy
                </button>
            </div>

            <div class="shop-item">
                <h3>Pubg UC 60</h3>
                <p>7000 Points</p>

                <button onclick="buyProduct('Pubg UC 60',7000)">
                    Buy
                </button>
            </div>

        </div>

    </div>

    <!-- LEADERBOARD PAGE -->
    <div id="leaderboardPage" class="page">

        <div class="header">
            <h1>Leaderboard</h1>
        </div>

        <div class="card">
            <div id="leaderboard"></div>
        </div>

    </div>

    <!-- WALLET PAGE -->
    <div id="walletPage" class="page">

        <div class="header">
            <h1>Withdraw</h1>
        </div>

        <div class="card">

            <input type="text"
                   id="walletInput"
                   placeholder="Enter KBZPay / WavePay Number">

            <button onclick="submitWithdraw()">
                Withdraw 10000 Points
            </button>

        </div>

    </div>

    <!-- ORDERS PAGE -->
    <div id="ordersPage" class="page">

        <div class="header">
            <h1>Orders</h1>
        </div>

        <div class="card">
            <p>Your orders will appear here.</p>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">

        <button onclick="showPage('homePage')">
            <i class="fa-solid fa-house"></i>
        </button>

        <button onclick="showPage('shopPage')">
            <i class="fa-solid fa-store"></i>
        </button>

        <button onclick="showPage('leaderboardPage')">
            <i class="fa-solid fa-trophy"></i>
        </button>

        <button onclick="showPage('walletPage')">
            <i class="fa-solid fa-wallet"></i>
        </button>

        <button onclick="showPage('ordersPage')">
            <i class="fa-solid fa-box"></i>
        </button>

    </div>

    <!-- PAGE SWITCH -->
    <script>

        function showPage(pageId){

            document
            .querySelectorAll(".page")
            .forEach(page => {
                page.classList.remove("active");
            });

            document
            .getElementById(pageId)
            .classList.add("active");
        }

        function joinChannel(){

            window.open("https://t.me/Myatt_205bot", "_blank");

            alert("Join the channel to receive rewards.");
        }

        function submitWithdraw(){

            const wallet =
                document.getElementById("walletInput").value;

            if(!wallet){
                alert("Enter wallet number");
                return;
            }

            withdraw(10000, wallet);
        }

    </script>

    <!-- APP JS -->
    <script src="app.js"></script>

</body>
</html>
