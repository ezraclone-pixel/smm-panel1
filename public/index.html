<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLash MM🇲🇲</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0088cc;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --bg-dark: #020203;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(0,136,204,0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255,215,0,0.08) 0%, transparent 40%);
            z-index: -2;
        }

        .bg-animate {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                conic-gradient(from 0deg at 50% 50%,
                    transparent 0%,
                    rgba(0,136,204,0.05) 25%,
                    transparent 50%,
                    rgba(255,215,0,0.03) 75%,
                    transparent 100%);
            animation: rotateBg 20s linear infinite;
            z-index: -1;
            filter: blur(60px);
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-bottom: 120px;
            min-height: 100vh;
        }

        .active-page {
            display: flex;
        }

        .premium-card {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 25px;
            backdrop-filter: blur(25px);
        }

        .features-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .feature-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .feature-box i {
            color: var(--gold);
            font-size: 20px;
            margin-bottom: 8px;
        }

        .feature-box span {
            display: block;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .feature-box small {
            opacity: 0.6;
            font-size: 11px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-blue {
            background: linear-gradient(135deg,#0088cc,#005580);
            color: white;
            border: none;
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
        }

        .item-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 22px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .icon-box-premium {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            margin-right: 14px;
        }

        .claim-btn {
            border: none;
            background: white;
            color: black;
            font-weight: bold;
            padding: 12px 22px;
            border-radius: 16px;
        }

        .balance-card {
            width: 100%;
            background: linear-gradient(135deg,#0088cc,#004466);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }

        .season-box {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            background: rgba(255,215,0,0.04);
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
        }

        #countdown {
            margin-top: 10px;
            color: var(--gold);
            font-weight: bold;
            font-size: 18px;
        }

        .leaderboard-list {
            width: 100%;
        }

        .rank-item {
            width: 100%;
            padding: 14px 18px;
            border-radius: 18px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rank-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .rank-number {
            width: 20px;
        }

        .rank-points {
            color: var(--gold);
            font-weight: bold;
        }

        .bottom-nav {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 15px;
            height: 72px;
            background: rgba(15,15,20,0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(25px);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            color: #777;
            text-decoration: none;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: white;
        }

        .nav-item.active i {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-animate"></div>

<!-- HOME -->
<div id="home" class="page active-page">
</div>


<!-- LEADERBOARD -->
<div id="leaderboard" class="page">

    <h2 style="margin:30px 0;">
        <i class="fas fa-trophy"
            style="color:var(--gold);"></i>
        Leaderboard
    </h2>

    <div class="season-box">
        <small>SEASON ENDS IN</small>
        <div id="countdown">
            00D : 00H : 00M : 00S
        </div>
    </div>

    <div class="leaderboard-list">

        <div class="rank-item">
            <div class="rank-info">
                <span class="rank-number">1</span>
                <span>Aung Kyaw</span>
            </div>
            <span class="rank-points">150000</span>
        </div>

        <div class="rank-item">
            <div class="rank-info">
                <span class="rank-number">2</span>
                <span>Su Su</span>
            </div>
            <span class="rank-points">120000</span>
        </div>

    </div>

</div>

<!-- EARN -->
<div id="earn" class="page">

    <h2 style="margin:30px 0;">Earn Points</h2>

    <div class="item-card">

        <div style="display:flex; align-items:center;">

            <div class="icon-box-premium">
                <i class="fas fa-calendar-check"></i>
            </div>

            <div>
                <p style="font-weight:bold;">Daily Reward</p>
                <small style="color:var(--gold);">
                    +500 Pts
                </small>
            </div>

        </div>

        <button class="claim-btn">
            Claim
        </button>

    </div>

    <div class="item-card">

        <div style="display:flex; align-items:center;">

            <div class="icon-box-premium">
                <i class="fab fa-telegram-plane"></i>
            </div>

            <div>
                <p style="font-weight:bold;">Join Channel</p>
                <small style="color:var(--gold);">
                    +2000 Pts
                </small>
            </div>

        </div>

        <button class="claim-btn">
            Join
        </button>

    </div>

    <div class="item-card">

        <div style="display:flex; align-items:center;">

            <div class="icon-box-premium">
                <i class="fas fa-users"></i>
            </div>

            <div>
                <p style="font-weight:bold;">Invite Friends</p>
                <small style="color:var(--gold);">
                    +1000 Pts
                </small>
            </div>

        </div>

        <button class="claim-btn">
            Invite
        </button>

    </div>

    <div class="item-card">

        <div style="display:flex; align-items:center;">

            <div class="icon-box-premium">
                <i class="fas fa-shopping-cart"></i>
            </div>

            <div>
                <p style="font-weight:bold;">Shop & Earn</p>
                <small style="color:var(--gold);">
                    Unlimited
                </small>
            </div>

        </div>

        <button class="claim-btn">
            Shop
        </button>

    </div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">

    <h2 style="margin:30px 0;">My Wallet</h2>

    <div class="balance-card">

        <p>Available Balance</p>

        <h1 style="font-size:50px; margin:15px 0;">
            0
        </h1>

        <p>10 Pts = 1 MMK</p>

    </div>

    <button class="btn-main btn-blue">
        Withdraw Money
    </button>

</div>

<!-- NAV -->
<nav class="bottom-nav">

    <a href="javascript:void(0)"
        class="nav-item active"
        onclick="showPage('home', this)">

        <i class="fas fa-home"></i>
        <span>Home</span>

    </a>

    <a href="javascript:void(0)"
        class="nav-item"
        onclick="showPage('leaderboard', this)">

        <i class="fas fa-trophy"></i>
        <span>Leaderboard</span>

    </a>

    <a href="javascript:void(0)"
        class="nav-item"
        onclick="showPage('earn', this)">

        <i class="fas fa-coins"></i>
        <span>Earn</span>

    </a>

    <a href="javascript:void(0)"
        class="nav-item"
        onclick="showPage('wallet', this)">

        <i class="fas fa-wallet"></i>
        <span>Wallet</span>

    </a>

</nav>

<script src="app.js"></script>

</body>
                    </html>
