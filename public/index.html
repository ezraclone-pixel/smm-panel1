<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral System</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:18px;
    background:#111827;
    font-weight:bold;
    font-size:18px;
}

.card{
    margin:12px;
    padding:14px;
    background:#1e293b;
    border-radius:12px;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

.btn:active{transform:scale(0.98);}

.box{
    background:#0b1220;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    word-break:break-all;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.small{font-size:13px;opacity:0.8;}
</style>
</head>

<body>

<div class="header">💎 Referral System</div>

<div class="card">
    <div class="small">👤 User</div>
    <div id="userId">Loading...</div>

    <div class="row">
        <div>
            <div class="small">💰 Balance</div>
            <div id="balance">0</div>
        </div>
        <div>
            <div class="small">👥 Referrals</div>
            <div id="refs">0</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="small">🔗 Referral Link</div>
    <div class="box" id="link">loading...</div>

    <button class="btn" onclick="copy()">📋 Copy</button>
    <button class="btn" onclick="share()">📤 Share</button>
</div>

<div class="card">
    <button class="btn" onclick="refresh()">🔄 Refresh</button>
</div>

<script src="app.js"></script>

</body>
</html>
