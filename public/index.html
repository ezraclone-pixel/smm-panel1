<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myat Digital Shop</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* ---------------- BASE ---------------- */
body {
  margin:0;
  font-family:-apple-system,system-ui,sans-serif;
  background: radial-gradient(circle at top,#0b0f14,#050608);
  color:#fff;
}

body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,136,204,0.12), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,215,0,0.06), transparent 40%);
  z-index:-1;
}

/* ---------------- PAGE ---------------- */
.page {
  display:none;
  min-height:100vh;
  padding:20px;
  padding-bottom:120px;
}

.active-page {
  display:flex;
  flex-direction:column;
}

/* ---------------- CARD ---------------- */
.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:18px;
  padding:16px;
  margin:10px 0;
}

/* ---------------- SMALL PREMIUM BUTTON ---------------- */
.small-btn {
  padding:6px 12px;
  font-size:11px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:#fff;
  font-weight:600;
  transition:0.2s;
}

.small-btn:active {
  transform:scale(0.92);
}

.small-btn.gold {
  background:linear-gradient(135deg,#ffd700,#ffb300);
  color:#000;
  border:none;
}

/* ---------------- TASK BOX ---------------- */
.task-box {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:12px;
  margin:10px 0;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ---------------- NAV ---------------- */
.bottom-nav {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  height:65px;
  background:rgba(10,10,15,0.85);
  backdrop-filter:blur(18px);
  border-radius:18px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
}

.nav-item {
  flex:1;
  text-align:center;
  color:#777;
  font-size:10px;
}

.nav-item i {
  display:block;
  font-size:18px;
  margin-bottom:3px;
}

.nav-item.active {
  color:#fff;
}

.nav-item.active i {
  color:#ffd700;
}
</style>

</head>

<body>

<!-- 🏠 HOME -->
<div id="home" class="page active-page">

  <div class="card">
    <h2>👋 Welcome</h2>
    <p>Myat Digital Shop</p>
  </div>

  <div class="card">
    <h3>Balance</h3>
    <p>Points: <span id="balance">0</span></p>
  </div>

  <!-- 🎮 GAME AREA -->
  <div class="card">
    <h3>🎮 Game Zone</h3>
    <p>Play & earn coming system</p>

    <button class="small-btn gold" onclick="startGame()">
      Start Game
    </button>
  </div>

</div>

<!-- ⚡ TASK -->
<div id="task" class="page">
  <div class="card">
    <h3>⚡ Earn Tasks</h3>

    <div class="task-box">
      <span><i class="fas fa-calendar-check" style="color:#ffd700;"></i> Daily Reward</span>
      <button class="small-btn gold" onclick="claimDaily()">Claim</button>
    </div>

    <div class="task-box">
      <span><i class="fas fa-user-friends" style="color:#00d4ff;"></i> Referral</span>
      <button class="small-btn" onclick="inviteFriends()">Invite</button>
    </div>

    <div class="task-box">
      <span><i class="fab fa-telegram" style="color:#0088cc;"></i> Channel</span>
      <button class="small-btn" onclick="window.open('https://t.me/Myatt_205bot')">Join</button>
    </div>

    <div class="task-box" style="border:1px solid rgba(255,215,0,0.3);">
      <span><i class="fas fa-gamepad" style="color:#ffd700;"></i> Play Game</span>
      <button class="small-btn gold" onclick="goHomeGame()">Play</button>
    </div>

  </div>
</div>

<!-- 🏆 LEADERBOARD -->
<div id="leaderboard" class="page">
  <div class="card">
    <h3>🏆 Leaderboard</h3>
    <p>Top players ranking</p>
  </div>
</div>

<!-- 💰 WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <h3>💰 Wallet</h3>
    <p>Balance: <span id="balance">0</span></p>

    <button class="small-btn gold" onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- 📱 NAV -->
<div class="bottom-nav">

  <div class="nav-item active" onclick="showPage('home', this)">
    <i class="fas fa-home"></i>
    Home
  </div>

  <div class="nav-item" onclick="showPage('task', this)">
    <i class="fas fa-bolt"></i>
    Task
  </div>

  <div class="nav-item" onclick="showPage('leaderboard', this)">
    <i class="fas fa-trophy"></i>
    Rank
  </div>

  <div class="nav-item" onclick="showPage('wallet', this)">
    <i class="fas fa-wallet"></i>
    Wallet
  </div>

</div>

<script src="app.js"></script>

<script>
function showPage(id, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById(id).classList.add('active-page');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');

  if(window.Telegram?.WebApp){
    Telegram.WebApp.HapticFeedback.impactOccurred('medium');
  }
}

/* Play game → home */
function goHomeGame(){
  showPage('home', document.querySelectorAll('.nav-item')[0]);
}

/* game start */
function startGame(){
  alert("Game coming soon 🚀");
}
</script>

</body>
</html>
